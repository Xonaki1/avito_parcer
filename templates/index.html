<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Avito Async Parser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4">🚀 Avito Асинхронный Парсер</h1>
    
    <form method="post" action="/parse" class="card p-4 mb-5">
        <div class="row g-3">
            <div class="col-md-6">
                <label>Поисковый запрос</label>
                <input type="text" name="query" class="form-control" placeholder="iPhone 15" required>
            </div>
            <div class="col-md-3">
                <label>Город / регион</label>
                <input type="text" name="location" class="form-control" value="rossiya" required>
            </div>
            <div class="col-md-3">
                <label>Страниц (макс)</label>
                <input type="number" name="max_pages" class="form-control" value="1" min="1" max="10">
            </div>
        </div>
        <button type="submit" class="btn btn-success mt-3">▶ Запустить парсинг</button>
    </form>

    {% if items %}
    <h3>Найдено: {{ total }} объявлений</h3>
    <a href="/download/{{ filename }}" class="btn btn-primary mb-3">Скачать CSV</a>
    
    <table class="table table-striped">
        <thead>
            <tr><th>Название</th><th>Цена</th><th>Ссылка</th></tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.title }}</td>
                <td>{{ item.price }}</td>
                <td><a href="{{ item.link }}" target="_blank">Открыть</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}
</div>
</body>
</html>
